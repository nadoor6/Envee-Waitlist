<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envee | Exclusive Waitlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .logo-image {
            max-width: 220px;
            width: 100%;
            height: auto;
            margin: 0 auto;
            display: block;
        }
        
        body {
            background-color: #f9f6ef;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        
        .card {
            max-width: 720px;
            width: 100%;
            background: rgba(249, 246, 239, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 35px -12px rgba(90, 22, 25, 0.12), 0 1px 2px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
            border: 1px solid rgba(90, 22, 25, 0.08);
            text-align: center;
        }
        
        .brand {
            margin-bottom: 1.2rem;
        }
        
        .brand h1 {
            font-size: 4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #2a2522;
        }
        
        .brand h1 span {
            font-weight: 300;
            color: #5a1619;
        }
        
        .badge {
            background: #5a1619;
            color: #f9f6ef;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }
        
        .tagline {
            font-size: 0.85rem;
            font-weight: 500;
            color: #5a1619;
            letter-spacing: 0.2em;
            margin-bottom: 0.75rem;
        }
        
        .description {
            font-size: 1rem;
            font-weight: 400;
            color: #4b4743;
            max-width: 500px;
            margin: 0 auto 2rem auto;
            line-height: 1.6;
        }
        
        .waitlist-title {
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .waitlist-sub {
            font-size: 0.9rem;
            color: #8a857e;
            margin-bottom: 2rem;
        }
        
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
        }
        
        .email-input {
            flex: 1;
            min-width: 250px;
            padding: 1rem 1.5rem;
            border-radius: 60px;
            border: 1px solid #e2ddd4;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            background: white;
            transition: all 0.2s;
        }
        
        .email-input:focus {
            border-color: #5a1619;
            outline: none;
            box-shadow: 0 0 0 3px rgba(90, 22, 25, 0.1);
        }
        
        .btn {
            background: #5a1619;
            border: none;
            border-radius: 60px;
            padding: 1rem 2rem;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            color: #f9f6ef;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 10px rgba(90, 22, 25, 0.2);
        }
        
        .btn:hover {
            background: #3f0e11;
            transform: translateY(-2px);
        }
        
        .message {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .message.success {
            color: #5a1619;
            background: rgba(90, 22, 25, 0.08);
            padding: 0.7rem;
            border-radius: 60px;
        }
        
        .message.error {
            color: #b13e44;
            background: rgba(90, 22, 25, 0.1);
            padding: 0.7rem;
            border-radius: 60px;
        }
        
        .footer {
            margin-top: 2.5rem;
            font-size: 0.7rem;
            color: #bcb6ae;
            border-top: 1px solid rgba(90, 22, 25, 0.1);
            padding-top: 1.5rem;
        }
        
        @media (max-width: 550px) {
            .card {
                padding: 1.8rem;
            }
            .brand h1 {
                font-size: 3rem;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="brand">
            <img src="logo.svg" alt="Envee logo" class="logo-image">
        </div>
        <div class="badge">Opening July 2026</div>
        <div class="tagline">GRAPHIC DESIGN & WEB DEVELOPMENT</div>
        <div class="description">Luxury digital craftsmanship — from bold identities to seamless web experiences.</div>
        <div class="waitlist-title">Join the waitlist</div>
        <div class="waitlist-sub">Be first to access our exclusive studio services.</div>

        <form id="waitlistForm">
            <div class="form-group">
                <input type="email" id="email" class="email-input" placeholder="Your email address" required>
                <button type="submit" class="btn">Reserve →</button>
            </div>
            <div id="message" class="message"></div>
        </form>
        <div class="footer">No spam, only rare updates</div>
    </div>

    <script>
        const form = document.getElementById('waitlistForm');
        const emailInput = document.getElementById('email');
        const msgDiv = document.getElementById('message');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const isValid = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(email);
            if (!email) {
                showMessage('Please enter your email address.', true);
            } else if (!isValid) {
                showMessage('Please use a valid email (e.g., name@domain.com).', true);
            } else {
                showMessage(`${email.split('@')[0]}, you're on the list. We'll contact you soon.`, false);
                emailInput.value = '';
                const btn = document.querySelector('.btn');
                const original = btn.innerText;
                btn.disabled = true;
                btn.innerText = '✓ Added';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = original;
                }, 1500);
            }
        });

        function showMessage(text, isError) {
            msgDiv.innerHTML = `<div class="${isError ? 'error' : 'success'}">${text}</div>`;
            setTimeout(() => {
                if (msgDiv.innerHTML.includes(text)) msgDiv.innerHTML = '';
            }, 4000);
        }
    </script>
</body>

</html>

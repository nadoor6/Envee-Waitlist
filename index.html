<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envee | Exclusive Waitlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .logo-image {
            max-width: 220px;
            width: 100%;
            height: auto;
            margin: 0 auto;
            display: block;
        }
        
        body {
            background-color: #f9f6ef;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        
        .card {
            max-width: 720px;
            width: 100%;
            background: rgba(249, 246, 239, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 35px -12px rgba(90, 22, 25, 0.12), 0 1px 2px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
            border: 1px solid rgba(90, 22, 25, 0.08);
            text-align: center;
        }
        
        .brand {
            margin-bottom: 1.2rem;
        }
        
        .badge {
            background: #5a1619;
            color: #f9f6ef;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }
        
        .tagline {
            font-size: 0.85rem;
            font-weight: 500;
            color: #5a1619;
            letter-spacing: 0.2em;
            margin-bottom: 0.75rem;
        }
        
        .description {
            font-size: 1rem;
            font-weight: 400;
            color: #4b4743;
            max-width: 500px;
            margin: 0 auto 2rem auto;
            line-height: 1.6;
        }
        /* Countdown timer */
        
        .countdown-container {
            margin: 1.5rem auto 2rem;
            max-width: 450px;
        }
        
        .countdown-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #5a1619;
            font-weight: 500;
            margin-bottom: 0.8rem;
        }
        
        .timer {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        
        .time-block {
            background: rgba(90, 22, 25, 0.04);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 0.8rem 0.6rem;
            min-width: 70px;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid rgba(90, 22, 25, 0.1);
        }
        
        .time-number {
            font-size: 2.2rem;
            font-weight: 600;
            color: #2a2522;
            line-height: 1;
            font-feature-settings: "tnum";
            letter-spacing: -0.02em;
        }
        
        .time-unit {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: #5a1619;
            margin-top: 0.3rem;
        }
        
        @media (max-width: 480px) {
            .timer {
                gap: 0.8rem;
            }
            .time-block {
                min-width: 60px;
                padding: 0.6rem 0.4rem;
            }
            .time-number {
                font-size: 1.6rem;
            }
        }
        
        .waitlist-title {
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .waitlist-sub {
            font-size: 0.9rem;
            color: #8a857e;
            margin-bottom: 2rem;
        }
        
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
        }
        
        .email-input {
            flex: 1;
            min-width: 250px;
            padding: 1rem 1.5rem;
            border-radius: 60px;
            border: 1px solid #e2ddd4;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            background: white;
            transition: all 0.2s;
        }
        
        .email-input:focus {
            border-color: #5a1619;
            outline: none;
            box-shadow: 0 0 0 3px rgba(90, 22, 25, 0.1);
        }
        
        .btn {
            background: #5a1619;
            border: none;
            border-radius: 60px;
            padding: 1rem 2rem;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            color: #f9f6ef;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 10px rgba(90, 22, 25, 0.2);
        }
        
        .btn:hover {
            background: #3f0e11;
            transform: translateY(-2px);
        }
        
        .message {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .message.success {
            color: #5a1619;
            background: rgba(90, 22, 25, 0.08);
            padding: 0.7rem;
            border-radius: 60px;
        }
        
        .message.error {
            color: #b13e44;
            background: rgba(90, 22, 25, 0.1);
            padding: 0.7rem;
            border-radius: 60px;
        }
        
        .footer {
            margin-top: 2.5rem;
            font-size: 0.7rem;
            color: #bcb6ae;
            border-top: 1px solid rgba(90, 22, 25, 0.1);
            padding-top: 1.5rem;
        }
        /* MUSIC BUTTON - LUXURY STYLE */
        
        .music-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #5a1619;
            color: #f9f6ef;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(90, 22, 25, 0.3);
            transition: all 0.2s ease;
            z-index: 1000;
            font-size: 1.4rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(249, 246, 239, 0.2);
        }
        
        .music-btn:hover {
            transform: scale(1.05);
            background: #3f0e11;
            box-shadow: 0 6px 16px rgba(90, 22, 25, 0.4);
        }
        
        .music-btn.playing {
            background: #3f0e11;
            box-shadow: 0 0 12px rgba(90, 22, 25, 0.5);
        }
        /* tooltip */
        
        .music-btn::after {
            content: "Play music";
            position: absolute;
            right: 60px;
            background: rgba(90, 22, 25, 0.85);
            color: #f9f6ef;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 40px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            font-family: 'Montserrat', sans-serif;
        }
        
        .music-btn:hover::after {
            opacity: 1;
        }
        
        @media (max-width: 550px) {
            .card {
                padding: 1.8rem;
            }
            .music-btn {
                width: 42px;
                height: 42px;
                font-size: 1.2rem;
                bottom: 16px;
                right: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="brand">
            <img src="logo.svg" alt="Envee logo" class="logo-image">
        </div>
        <div class="badge">Opening July 2026</div>
        <div class="tagline">GRAPHIC DESIGN & WEB DEVELOPMENT</div>
        <div class="description">Luxury digital craftsmanship — from bold identities to seamless web experiences.</div>

        <!-- COUNTDOWN TIMER -->
        <div class="countdown-container">
            <div class="countdown-label">Opening in</div>
            <div class="timer" id="luxuryTimer">
                <div class="time-block">
                    <div class="time-number" id="days">00</div>
                    <div class="time-unit">Days</div>
                </div>
                <div class="time-block">
                    <div class="time-number" id="hours">00</div>
                    <div class="time-unit">Hours</div>
                </div>
                <div class="time-block">
                    <div class="time-number" id="minutes">00</div>
                    <div class="time-unit">Minutes</div>
                </div>
                <div class="time-block">
                    <div class="time-number" id="seconds">00</div>
                    <div class="time-unit">Seconds</div>
                </div>
            </div>
        </div>

        <div class="waitlist-title">Join the waitlist</div>
        <div class="waitlist-sub">Be first to access our exclusive studio services.</div>

        <form id="waitlistForm">
            <div class="form-group">
                <input type="email" id="email" class="email-input" placeholder="Your email address" required>
                <button type="submit" class="btn">Reserve →</button>
            </div>
            <div id="message" class="message"></div>
        </form>
        <div class="footer">No spam, only rare updates</div>
    </div>

    <!-- MUSIC BUTTON & AUDIO ELEMENT -->
    <div class="music-btn" id="musicToggle">♪</div>
    <audio id="bgMusic" loop preload="auto">
        <source src="background-music.mp3" type="audio/mpeg">
        <!-- If your file is .wav, add a second source line -->
        Your browser does not support the audio element.
    </audio>

    <script>
        // ========== COUNTDOWN TIMER ==========
        const targetDate = new Date(2026, 6, 1, 0, 0, 0); // July 1, 2026

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('days').innerText = '00';
                document.getElementById('hours').innerText = '00';
                document.getElementById('minutes').innerText = '00';
                document.getElementById('seconds').innerText = '00';
                const label = document.querySelector('.countdown-label');
                if (label) label.innerText = 'Now open';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);

            document.getElementById('days').innerText = String(days).padStart(2, '0');
            document.getElementById('hours').innerText = String(hours).padStart(2, '0');
            document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
            document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);

        // ========== BACKGROUND MUSIC WITH FADE-IN ==========
        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicToggle');
        let isPlaying = false;
        let fadeInterval = null;

        // Function to stop any ongoing fade
        function stopFade() {
            if (fadeInterval) {
                clearInterval(fadeInterval);
                fadeInterval = null;
            }
        }

        // Fade-in over specified duration (ms)
        function fadeIn(audioElement, duration = 8000) {
            return new Promise((resolve) => {
                // If already fading, stop previous
                stopFade();
                // Set volume to 0
                audioElement.volume = 0;
                // Ensure audio is playing
                audioElement.play().then(() => {
                    const startTime = performance.now();
                    const startVolume = 0;
                    const endVolume = 1;

                    function step(now) {
                        const elapsed = now - startTime;
                        let progress = Math.min(1, elapsed / duration);
                        // Easing function: cubic out for smooth start
                        const easeProgress = 1 - Math.pow(1 - progress, 3);
                        audioElement.volume = startVolume + (endVolume - startVolume) * easeProgress;

                        if (progress < 1) {
                            fadeInterval = requestAnimationFrame(step);
                        } else {
                            audioElement.volume = 1;
                            stopFade();
                            resolve();
                        }
                    }

                    fadeInterval = requestAnimationFrame(step);
                }).catch(err => {
                    console.warn("Playback failed:", err);
                    resolve(); // still resolve to avoid hanging
                });
            });
        }

        // Pause and reset volume (no fade-out needed, but we set volume to 1 for next fade-in)
        function pauseMusic() {
            stopFade();
            audio.pause();
            // Keep volume at 1 so next fade-in starts from 0 anyway
            isPlaying = false;
            updateMusicButton();
        }

        // Start playing with fade-in
        async function playMusicWithFade() {
            // If already playing, do nothing
            if (isPlaying) return;
            // Reset volume to 0 before fade
            audio.volume = 0;
            await fadeIn(audio, 8000);
            isPlaying = true;
            updateMusicButton();
        }

        // Toggle play/pause
        async function toggleMusic() {
            if (isPlaying) {
                pauseMusic();
            } else {
                await playMusicWithFade();
            }
        }

        // Update button UI
        function updateMusicButton() {
            if (isPlaying) {
                musicBtn.innerHTML = '♫';
                musicBtn.classList.add('playing');
                musicBtn.title = 'Pause music';
                // Update pseudo-element content alternative? We'll rely on title.
                // Also change tooltip text via CSS? Not needed.
            } else {
                musicBtn.innerHTML = '♪';
                musicBtn.classList.remove('playing');
                musicBtn.title = 'Play music';
            }
        }

        // Event listener for button click
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMusic();
        });

        // Initialize: not playing, volume set to 0 (so no sudden sound)
        audio.volume = 0;
        updateMusicButton();

        // Optional: Preload metadata, but no autoplay.
    </script>
</body>

</html>
